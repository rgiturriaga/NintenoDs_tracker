services:
  ds-tracker:
    build: .
    container_name: ds-tracker

    # --- Restart policy ---
    # unless-stopped: restarts on crash AND on server reboot.
    # Only stays down if you explicitly run `docker compose down`.
    restart: unless-stopped

    env_file:
      - .env

    # ---------------------------------------------------------------
    # Resource limits
    # ---------------------------------------------------------------
    # Firefox ESR headless peaks at 150-300 MB on its own.
    # Adding Python, Selenium and page parsing, the realistic peak
    # is 380-450 MB. 512 MB is the safe floor; lower to 400 M only
    # after checking `docker stats ds-tracker` under real load.
    #
    # CPU is capped at half a core. Scrapes are infrequent (once per
    # CHECK_INTERVAL) so 0.5 CPUs is more than enough.
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
          pids: 100
        reservations:
          # Reserve a baseline so the OOM killer does not starve the bot
          # during memory pressure from other processes on the host.
          memory: 128M

    # ---------------------------------------------------------------
    # Environment
    # ---------------------------------------------------------------
    # DBUS_SESSION_BUS_ADDRESS: Firefox tries to connect to the D-Bus
    # session bus at startup. Inside a container there is no bus daemon
    # running, so Firefox hangs waiting for a connection that never comes.
    # Pointing it to /dev/null tells Firefox to skip D-Bus entirely.
    environment:
      - DBUS_SESSION_BUS_ADDRESS=unix:path=/dev/null

    # ---------------------------------------------------------------
    # Security hardening
    # ---------------------------------------------------------------

    # Prevent any process inside the container from gaining new privileges
    # via setuid/setgid binaries or file capabilities.
    security_opt:
      - no-new-privileges:true

    # Drop every Linux capability. The bot only does HTTP requests and
    # file reads — it does not need raw sockets, mounting, or any
    # kernel-level privilege.
    cap_drop:
      - ALL

    # Make the container filesystem read-only. An attacker who gets code
    # execution cannot write a backdoor, drop a cron job, or modify
    # the application files on disk.
    #
    # NOTE: read_only is intentionally disabled here. Firefox writes profile
    # data, crash reports, and lock files at startup across several paths.
    # The combination of read_only + cap_drop caused Firefox to hang and
    # timeout. Security is maintained through: non-root user, no-new-privileges,
    # cap_drop:ALL, pids limit, and resource limits.
    # read_only: true

    # /tmp as tmpfs keeps Firefox temp files off the host disk.
    # The /home/appuser tmpfs is no longer needed since the filesystem
    # is writable and Firefox can manage its own profile directory.
    tmpfs:
      - /tmp:size=200m,mode=1777

    # Firefox uses /dev/shm for shared memory between its processes.
    # The Docker default of 64 MB can cause page rendering crashes;
    # 128 MB is sufficient for a single headless session.
    shm_size: "128m"


    # ---------------------------------------------------------------
    # Log rotation
    # ---------------------------------------------------------------
    # json-file driver with rotation keeps the server disk clean
    # on a deployment that runs indefinitely.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
