services:
  ds-tracker:
    build: .
    container_name: ds-tracker

    # --- Restart policy ---
    # unless-stopped: restarts on crash AND on server reboot.
    # Only stays down if you explicitly run `docker compose down`.
    restart: unless-stopped

    env_file:
      - .env

    # ---------------------------------------------------------------
    # Resource limits
    # ---------------------------------------------------------------
    # Without Firefox the memory footprint is tiny: Python + requests +
    # BeautifulSoup peaks well under 100 MB. 256 MB gives a safe headroom.
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
          pids: 50
        reservations:
          memory: 64M

    # ---------------------------------------------------------------
    # Security hardening
    # ---------------------------------------------------------------

    security_opt:
      - no-new-privileges:true

    # Drop every Linux capability. The bot only does HTTP requests and
    # HTML parsing — it requires no kernel privileges whatsoever.
    cap_drop:
      - ALL

    # The container filesystem is read-only. An attacker who gets code
    # execution cannot write a backdoor, drop a cron job, or modify
    # the application files on disk. Without Firefox this works cleanly
    # since requests/BeautifulSoup write nothing to disk.
    read_only: true

    # Minimal writable tmpfs for Python's own temp needs.
    tmpfs:
      - /tmp:size=32m,mode=1777

    # ---------------------------------------------------------------
    # Log rotation
    # ---------------------------------------------------------------
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
